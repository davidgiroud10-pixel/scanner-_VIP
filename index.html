<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LE COIN TRADER - TERMINAL VIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #060606;
            --accent: #e3b341;
            --blue-jifu: #00d2ff;
            --border: #1e222d;
        }

        html, body { height: 100%; margin: 0; overflow: hidden; background-color: var(--bg-deep); font-family: 'Inter', sans-serif; color: white; }
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* HEADER */
        .top-nav-bar {
            height: 45px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: flex-end; padding: 0 20px; gap: 20px; font-size: 12px;
        }
        .live-tag { background: #ff0050; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 9px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        .main-container { display: flex; flex: 1; height: calc(100vh - 45px); }

        /* ZONE GRAPHIQUE */
        .center-content { flex: 1; display: flex; flex-direction: column; background: #131722; position: relative; }
        #tv-chart { flex: 1; border: none; }

        /* FILIGRANE LOGO CENTRE */
        .chart-watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            opacity: 0.08; width: 300px; pointer-events: none; z-index: 1;
        }

        /* DASHBOARD DROITE */
        #side-dashboard { width: 320px; background-color: #000; border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        
        .header-brand { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .header-logo { height: 45px; }

        .calc-card { background: #121212; margin: 10px; padding: 15px; border-radius: 8px; border: 1px solid #2a2e39; }
        .result-box { background: #000; border: 2px solid var(--blue-jifu); margin-top: 15px; padding: 12px; border-radius: 6px; text-align: center; }
        .result-val { color: var(--blue-jifu); font-size: 32px; font-weight: 800; display: block; }
        
        input { width: 100%; background: #000; border: 1px solid #333; border-radius: 4px; padding: 8px; color: white; margin-top: 5px; outline: none; box-sizing: border-box; }
        
        .signal-item { 
            margin: 5px 10px; padding: 12px; background: #121212; border-radius: 6px; 
            border-left: 3px solid var(--accent); cursor: pointer; transition: 0.2s;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header class="top-nav-bar">
        <div class="live-tag">LIVE</div>
        <div id="clock">--:--:-- Europe/Paris</div>
        <div style="width: 28px; height: 28px; background: #333; border-radius: 50%;"></div>
    </header>

    <div class="main-container">
        <div class="center-content">
            <div id="tv-chart"></div>
            <img src="logo.png" class="chart-watermark">
        </div>

        <aside id="side-dashboard">
            <div class="header-brand">
                <img src="logo.png" class="header-logo">
            </div>

            <div class="calc-card">
                <div style="color:var(--blue-jifu); text-align:center; font-size:11px; font-weight:bold; margin-bottom:10px;">RISK MANAGEMENT</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label style="font-size:9px; color:#666;">CAPITAL ($)</label><input type="number" id="cap" value="1000" oninput="calculate()"></div>
                    <div><label style="font-size:9px; color:#666;">RISQUE %</label><input type="number" id="risk" value="1" oninput="calculate()"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <div><label style="font-size:9px; color:#666;">ENTRÉE</label><input type="number" id="entry" oninput="calculate()"></div>
                    <div><label style="font-size:9px; color:#666;">STOP LOSS</label><input type="number" id="sl" oninput="calculate()"></div>
                </div>
                <div class="result-box">
                    <span id="res-lot" class="result-val">0.00</span>
                </div>
            </div>

            <div style="font-size:10px; padding:10px 15px; color:#444;">SIGNAUX SCANNER</div>
            <div class="signal-item" onclick="activateSignal('BITSTAMP:BTCUSD', 79723, 79200, 'crypto')">
                <b>BITCOIN (BTC)</b><br><small style="color:var(--accent)">Achat @ 79723</small>
            </div>
            <div class="signal-item" style="border-left-color: var(--blue-jifu)" onclick="activateSignal('OANDA:XAUUSD', 2348.40, 2342.10, 'gold')">
                <b>GOLD (OR)</b><br><small style="color:var(--blue-jifu)">Achat @ 2348.40</small>
            </div>
        </aside>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentMode = 'crypto';

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR') + " Europe/Paris"; }, 1000);

    function activateSignal(symbol, entryPrice, stopLoss, mode) {
        currentMode = mode;
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "5",
            "theme": "dark",
            "style": "1",
            "container_id": "tv-chart",
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "details": false,
            "studies": [] // RSI retiré d'ici
        });

        document.getElementById('entry').value = entryPrice;
        document.getElementById('sl').value = stopLoss;
        calculate();
    }

    function calculate() {
        const cap = parseFloat(document.getElementById('cap').value);
        const risk = parseFloat(document.getElementById('risk').value);
        const entry = parseFloat(document.getElementById('entry').value);
        const sl = parseFloat(document.getElementById('sl').value);

        if (cap && risk && entry && sl && entry !== sl) {
            const riskAmount = cap * (risk / 100);
            const diff = Math.abs(entry - sl);
            let res = (currentMode === 'crypto') ? (riskAmount / diff) : (riskAmount / (diff * 10));
            document.getElementById('res-lot').innerText = (res < 0.01 ? 0.01 : res).toFixed(2);
        }
    }

    window.onload = () => { activateSignal('OANDA:XAUUSD', 2348.4, 2342.1, 'gold'); };
</script>
</body>
</html>
