<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LE COIN TRADER - TERMINAL VIP V15.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-deep: #060606;
            --bg-sidebar: #000000;
            --accent: #e3b341;
            --blue-jifu: #00d2ff;
            --border: #1e222d;
        }

        html, body { height: 100%; margin: 0; overflow: hidden; background-color: var(--bg-deep); font-family: 'Inter', sans-serif; color: white; }
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        .top-nav-bar {
            height: 45px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: flex-end; padding: 0 20px; gap: 20px; font-size: 12px; z-index: 100;
        }
        .live-tag { background: #ff0050; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 9px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        .main-container { display: flex; flex: 1; height: calc(100vh - 45px); }

        .jifu-sidebar {
            width: 60px; background-color: #000; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding-top: 15px; flex-shrink: 0;
        }
        .nav-icon { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; color: #d1d4dc; cursor: pointer; font-size: 18px; border: none; background: none; }
        .nav-icon.active { color: var(--accent); border-left: 3px solid var(--accent); }

        .center-content { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #131722; }
        #tv-chart { flex: 1; border: none; }

        #oscillator-zone {
            height: 130px; background: #000; border-top: 2px solid var(--border); padding: 10px; flex-shrink: 0;
        }
        .wave-header { font-size: 10px; color: #8b949e; display: flex; justify-content: space-between; margin-bottom: 5px; text-transform: uppercase; }

        #side-dashboard { width: 320px; background-color: #000; border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        .calc-card { background: #121212; margin: 10px; padding: 15px; border-radius: 8px; border: 1px solid #2a2e39; }
        .result-box { background: #000; border: 2px solid var(--blue-jifu); margin-top: 15px; padding: 12px; border-radius: 6px; text-align: center; }
        .result-val { color: var(--blue-jifu); font-size: 32px; font-weight: 800; display: block; }
        input { width: 100%; background: #000; border: 1px solid #333; border-radius: 4px; padding: 8px; color: white; margin-top: 5px; outline: none; box-sizing: border-box; }
        
        .signal-item { 
            margin: 5px 10px; padding: 12px; background: #121212; border-radius: 6px; 
            border-left: 3px solid var(--accent); cursor: pointer; transition: 0.2s;
        }
        .signal-item:hover { background: #1c1c1c; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header class="top-nav-bar">
        <div class="live-tag">LIVE</div>
        <div id="clock">--:--:-- Europe/Paris</div>
        <div><i class="fas fa-globe"></i> French (FR)</div>
        <div style="width: 28px; height: 28px; background: #333; border-radius: 50%;"></div>
    </header>

    <div class="main-container">
        <nav class="jifu-sidebar">
            <button class="nav-icon active"><i class="fas fa-home"></i></button>
            <button class="nav-icon" style="color:var(--accent)"><i class="fas fa-microchip"></i></button>
            <button class="nav-icon"><i class="fas fa-chart-bar"></i></button>
            <button class="nav-icon" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i></button>
        </nav>

        <div class="center-content">
            <div id="tv-chart"></div>
            <div id="oscillator-zone">
                <div class="wave-header">
                    <span>TREND WAVE MOMENTUM OSCILLATOR</span>
                    <span id="wave-val" style="color:var(--blue-jifu)">0.00 / 0.00</span>
                </div>
                <canvas id="waveCanvas"></canvas>
            </div>
        </div>

        <aside id="side-dashboard">
            <div class="calc-card">
                <div style="color:var(--blue-jifu); text-align:center; font-size:11px; font-weight:bold; margin-bottom:15px; text-transform:uppercase;">Risk Management</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label style="font-size:9px; color:#8b949e;">CAPITAL ($)</label><input type="number" id="cap" value="1000"></div>
                    <div><label style="font-size:9px; color:#8b949e;">RISQUE %</label><input type="number" id="risk" value="1"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <div><label style="font-size:9px; color:#8b949e;">ENTRÉE</label><input type="number" id="entry" placeholder="0.00"></div>
                    <div><label style="font-size:9px; color:#8b949e;">STOP LOSS</label><input type="number" id="sl" placeholder="0.00"></div>
                </div>
                <div class="result-box">
                    <span style="font-size:9px; color:var(--blue-jifu); font-weight:bold;">POSITION SIZE (LOTS)</span>
                    <span id="lot-result" class="result-val">0.00</span>
                </div>
            </div>

            <div style="font-size:10px; color:#444; padding:10px 15px; font-weight:bold;">SCANNER VIP ALERTS</div>
            <div class="signal-item" onclick="activateSignal('BITSTAMP:BTCUSD', 79723, 79200, 'crypto')">
                <b>BITCOIN (BTC)</b><br><small style="color:var(--accent)">Achat @ 79723</small>
            </div>
            <div class="signal-item" style="border-left-color: var(--blue-jifu)" onclick="activateSignal('OANDA:XAUUSD', 2348.40, 2342.10, 'gold')">
                <b>GOLD (XAUUSD)</b><br><small style="color:var(--blue-jifu)">Achat @ 2348.40</small>
            </div>
            <div class="signal-item" style="border-left-color: #ff5252" onclick="activateSignal('CAPITALCOM:US30', 38500, 38450, 'index')">
                <b>DOW JONES (US30)</b><br><small style="color:#ff5252;">Achat @ 38500</small>
            </div>
        </aside>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentMode = 'crypto';

    // 1. HORLOGE
    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR') + " Europe/Paris"; 
    }, 1000);

    // 2. CALCULATEUR SPÉCIAL PU PRIME
    function calculateLots() {
        const cap = parseFloat(document.getElementById('cap').value) || 0;
        const risk = parseFloat(document.getElementById('risk').value) || 0;
        const entry = parseFloat(document.getElementById('entry').value) || 0;
        const sl = parseFloat(document.getElementById('sl').value) || 0;

        if (cap > 0 && risk > 0 && Math.abs(entry - sl) > 0) {
            const riskAmount = cap * (risk / 100);
            const distance = Math.abs(entry - sl);
            
            let totalLots = 0;
            // Logique contractuelle PU Prime
            if (currentMode === 'gold') totalLots = riskAmount / (distance * 100);
            else if (currentMode === 'crypto') totalLots = riskAmount / distance;
            else if (currentMode === 'index') totalLots = riskAmount / distance;
            else if (currentMode === 'forex') totalLots = riskAmount / (distance * 10);

            document.getElementById('lot-result').innerText = (totalLots < 0.01 ? 0.01 : totalLots).toFixed(2);
        } else {
            document.getElementById('lot-result').innerText = "0.00";
        }
    }

    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', calculateLots);
    });

    // 3. ACTIVATION SIGNAL
    function activateSignal(symbol, entry, sl, mode) {
        currentMode = mode;
        new TradingView.widget({
            "autosize": true, "symbol": symbol, "interval": "5", "theme": "dark", "container_id": "tv-chart",
            "studies": ["StochasticRSI@tv-basicstudies"]
        });
        document.getElementById('entry').value = entry;
        document.getElementById('sl').value = sl;
        calculateLots();

        const Toast = Swal.mixin({
            toast: true, position: 'top-end', showConfirmButton: false, timer: 2000, background: '#121212', color: '#fff'
        });
        Toast.fire({ icon: 'success', title: `${symbol} chargé en mode ${mode}` });
    }

    // 4. OSCILLATEUR WAVETREND
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    let angle = 0, points = [];

    function animate() {
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        angle += 0.05;
        let wt1 = Math.sin(angle)*25 + Math.sin(angle*0.5)*10;
        let wt2 = Math.sin(angle-0.5)*20;
        points.push({wt1, wt2});
        if(points.length > canvas.width) points.shift();
        
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.strokeStyle = "#00ff88";
        points.forEach((p, i) => ctx.lineTo(i, (canvas.height/2)-p.wt1)); ctx.stroke();
        ctx.beginPath(); ctx.strokeStyle = "#ff0050";
        points.forEach((p, i) => ctx.lineTo(i, (canvas.height/2)-p.wt2)); ctx.stroke();
        
        document.getElementById('wave-val').innerText = wt1.toFixed(2) + " / " + wt2.toFixed(2);
        requestAnimationFrame(animate);
    }
    animate();

    window.onload = () => activateSignal('BITSTAMP:BTCUSD', 79723, 79200, 'crypto');
</script>
</body>
</html>
