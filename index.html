<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LE COIN TRADER - VIP TERMINAL V15.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #060606; /* Noir plus profond comme sur les photos */
            --bg-sidebar: #0b0b0b;
            --bg-card: #121212;
            --accent: #e3b341;
            --blue-jifu: #00d2ff;
            --border: #1e222d;
        }

        html, body { height: 100%; margin: 0; overflow: hidden; background-color: var(--bg-deep); font-family: 'Inter', sans-serif; color: white; }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* HEADER SUPÉRIEUR (Photo 4) */
        .top-nav-bar {
            height: 50px;
            background: #000;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 20px;
            gap: 20px;
            font-size: 13px;
        }
        .live-tag { background: #ff0050; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 10px; }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR COMPLÈTE (Photo 1) */
        .jifu-sidebar {
            width: 60px;
            background-color: #000;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
        }
        .nav-icon {
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            margin-bottom: 10px; color: #d1d4dc; cursor: pointer; font-size: 18px;
        }
        .nav-icon.active { color: var(--accent); position: relative; }
        .nav-icon.active::after { content: ''; position: absolute; left: 0; width: 3px; height: 20px; background: var(--accent); }

        /* ZONE CENTRALE */
        .center-content { flex: 1; display: flex; flex-direction: column; position: relative; background: #131722; }

        /* BARRE D'OUTILS GRAPHIQUE (Photo 2) */
        .chart-controls {
            height: 40px; background: #131722; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: flex-end; padding: 0 10px; gap: 10px;
        }
        .ctrl-btn { background: #2a2e39; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }

        #chart-zone { flex: 1; position: relative; }
        #tv-chart { position: absolute; width: 100%; height: 100%; }

        /* OSCILLATEUR TREND WAVE (Photo 5) */
        #oscillator-zone {
            height: 180px;
            background: #131722;
            border-top: 4px solid #000;
            position: relative;
            padding: 10px;
        }
        .wave-header { font-size: 10px; color: #8b949e; display: flex; justify-content: space-between; margin-bottom: 10px;}

        /* DASHBOARD DROITE */
        #side-dashboard { width: 320px; background-color: #000; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        
        .alert-notif-btn {
            background: #121212; margin: 10px; padding: 12px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px; cursor: pointer;
        }

        .calc-card { background: #121212; margin: 10px; padding: 15px; border-radius: 10px; border: 1px solid #2a2e39; }
        .result-box { background: #000; border: 2px solid var(--blue-jifu); margin-top: 15px; padding: 15px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <!-- TOP BAR (Photo 4) -->
    <header class="top-nav-bar">
        <div class="live-tag">LIVE</div>
        <div>23:48 Europe/Paris <i class="fas fa-chevron-down"></i></div>
        <div><i class="fas fa-globe"></i> French (FR) <i class="fas fa-chevron-down"></i></div>
        <div><i class="fas fa-bell-slash"></i></div>
        <div style="width: 30px; height: 30px; background: #333; border-radius: 50%;"></div>
    </header>

    <div class="main-container">
        <!-- SIDEBAR (Photo 1) -->
        <nav class="jifu-sidebar">
            <div class="nav-icon active"><i class="fas fa-home"></i></div>
            <div class="nav-icon"><i class="fas fa-graduation-cap"></i></div>
            <div class="nav-icon"><i class="fas fa-lightbulb"></i></div>
            <div class="nav-icon"><i class="fas fa-chalkboard-teacher"></i></div>
            <div class="nav-icon"><i class="fas fa-address-book"></i></div>
            <div class="nav-icon" style="color:var(--accent)"><i class="fas fa-microchip"></i></div>
            <div class="nav-icon"><i class="fas fa-certificate"></i></div>
            <div class="nav-icon"><i class="fas fa-chart-line"></i></div>
            <div class="nav-icon"><i class="fas fa-comments"></i></div>
            <div class="nav-icon" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i></div>
        </nav>

        <div class="center-content">
            <!-- CONTROLES (Photo 2) -->
            <div class="chart-controls">
                <select class="ctrl-btn"><option>Dark</option></select>
                <button class="ctrl-btn" style="color:#ff5252;"><i class="fas fa-trash"></i></button>
                <button class="ctrl-btn"><i class="fas fa-camera"></i></button>
                <button class="ctrl-btn"><i class="fas fa-expand"></i></button>
            </div>

            <div id="chart-zone">
                <div id="tv-chart"></div>
                <img src="logo.png" class="chart-watermark" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.1; width: 200px; pointer-events: none;">
            </div>

            <!-- OSCILLATEUR (Photo 5) -->
            <div id="oscillator-zone">
                <div class="wave-header">
                    <span>TREND WAVE MOMENTUM OSCILLATOR</span>
                    <span>18.3980 / -5.4517</span>
                </div>
                <!-- Ici le canvas ou l'iframe de l'oscillateur -->
                <div style="width: 100%; height: 100px; background: linear-gradient(transparent, rgba(0,210,255,0.05)); border-bottom: 1px solid #2a2e39;"></div>
            </div>
        </div>

        <!-- DASHBOARD DROITE (Photo 3) -->
        <aside id="side-dashboard">
            <div class="header-brand"><img src="logo.png" style="height: 35px;"></div>
            
            <div class="alert-notif-btn">
                <i class="fas fa-bell"></i> Alert Notifications <i class="fas fa-chevron-down"></i>
            </div>

            <div class="calc-card">
                <div style="color:var(--blue-jifu); font-size:11px; font-weight:bold; margin-bottom:15px; text-align:center;">RISK MANAGEMENT</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label style="font-size:9px; color:#666;">CAPITAL ($)</label><input type="number" id="cap" value="1000" oninput="updateCalculation()"></div>
                    <div><label style="font-size:9px; color:#666;">RISQUE %</label><input type="number" id="risk" value="1" oninput="updateCalculation()"></div>
                </div>
                <div class="result-box">
                    <div style="font-size:10px; color:var(--blue-jifu); margin-bottom:5px;">POSITION SIZE (LOTS)</div>
                    <div id="res-lot" style="font-size:32px; font-weight:bold; color:var(--blue-jifu);">0.16</div>
                </div>
            </div>

            <div style="font-size:11px; padding:10px 15px; color:#555;">SCANNER VIP ALERTS</div>
            <div id="alerts-container">
                <!-- Tes signaux ici -->
            </div>
        </aside>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // Ton JS actuel pour le calculateur et le changement de graphique reste identique
    function loadChart(symbol) {
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "5",
            "theme": "dark",
            "style": "1",
            "container_id": "tv-chart",
            "backgroundColor": "#131722",
            "gridColor": "#2a2e39",
            "hide_top_toolbar": false,
            "hide_legend": false,
            "save_image": false
        });
    }
    loadChart("BITSTAMP:BTCUSD");
</script>
</body>
</html>
