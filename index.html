<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LE COIN TRADER - TERMINAL VIP V15.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #060606;
            --bg-sidebar: #000000;
            --bg-card: #121212;
            --accent: #e3b341;
            --blue-jifu: #00d2ff;
            --border: #1e222d;
        }

        html, body { height: 100%; margin: 0; overflow: hidden; background-color: var(--bg-deep); font-family: 'Inter', sans-serif; color: white; }
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* HEADER DYNAMIQUE */
        .top-nav-bar {
            height: 45px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: flex-end; padding: 0 20px; gap: 20px; font-size: 12px; z-index: 100;
        }
        .live-tag { background: #ff0050; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 9px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        .main-container { display: flex; flex: 1; height: calc(100vh - 45px); }

        /* SIDEBAR STYLE JIFU */
        .jifu-sidebar {
            width: 60px; background-color: #000; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding-top: 15px; flex-shrink: 0;
        }
        .nav-icon { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; color: #d1d4dc; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .nav-icon.active { color: var(--accent); position: relative; }
        .nav-icon.active::after { content: ''; position: absolute; left: 0; width: 3px; height: 20px; background: var(--accent); }

        /* CENTRE */
        .center-content { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #131722; }
        .chart-controls {
            height: 38px; background: #131722; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: flex-end; padding: 0 10px; gap: 8px;
        }
        .ctrl-btn { background: #2a2e39; border: none; color: white; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        #chart-zone { flex: 1; position: relative; overflow: hidden; }
        #tv-chart { width: 100%; height: 100%; border: none; }
        .chart-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.12; width: 250px; pointer-events: none; z-index: 5; }

        /* OSCILLATEUR ANIME */
        #oscillator-zone {
            height: 130px; background: #000; border-top: 2px solid var(--border); padding: 10px; flex-shrink: 0;
        }
        .wave-header { font-size: 10px; color: #8b949e; display: flex; justify-content: space-between; margin-bottom: 5px; text-transform: uppercase; }

        /* DASHBOARD DROITE */
        #side-dashboard {
            width: 320px; background-color: #000; border-left: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
        }
        .header-brand { padding: 15px; text-align: center; border-bottom: 1px solid var(--border); }
        .calc-card { background: #121212; margin: 10px; padding: 15px; border-radius: 8px; border: 1px solid #2a2e39; }
        .result-box { background: #000; border: 1px solid var(--blue-jifu); margin-top: 15px; padding: 12px; border-radius: 6px; text-align: center; }
        .result-val { color: var(--blue-jifu); font-size: 32px; font-weight: 800; display: block; }
        input { width: 100%; background: #000; border: 1px solid #333; border-radius: 4px; padding: 8px; color: white; margin-top: 5px; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--accent); }
    </style>
</head>
<body>

<div class="app-wrapper">
    <!-- HEADER AVEC HEURE REELLE -->
    <header class="top-nav-bar">
        <div class="live-tag">LIVE</div>
        <div id="clock-display">--:--:-- Europe/Paris</div>
        <div><i class="fas fa-globe"></i> French (FR) <i class="fas fa-chevron-down"></i></div>
        <div><i class="fas fa-bell-slash"></i></div>
        <div style="width: 28px; height: 28px; background: #333; border-radius: 50%;"></div>
    </header>

    <div class="main-container">
        <!-- SIDEBAR -->
        <nav class="jifu-sidebar">
            <div class="nav-icon active"><i class="fas fa-home"></i></div>
            <div class="nav-icon"><i class="fas fa-graduation-cap"></i></div>
            <div class="nav-icon"><i class="fas fa-lightbulb"></i></div>
            <div class="nav-icon"><i class="fas fa-video"></i></div>
            <div class="nav-icon"><i class="fas fa-id-badge"></i></div>
            <div class="nav-icon" style="color:var(--accent)"><i class="fas fa-microchip"></i></div>
            <div class="nav-icon"><i class="fas fa-award"></i></div>
            <div class="nav-icon"><i class="fas fa-chart-bar"></i></div>
            <div class="nav-icon" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i></div>
        </nav>

        <div class="center-content">
            <div class="chart-controls">
                <select class="ctrl-btn"><option>Dark</option></select>
                <button class="ctrl-btn"><i class="fas fa-camera"></i></button>
                <button class="ctrl-btn"><i class="fas fa-expand"></i></button>
            </div>
            <div id="chart-zone">
                <div id="tv-chart"></div>
                <img src="logo.png" class="chart-watermark">
            </div>
            <div id="oscillator-zone">
                <div class="wave-header">
                    <span>TREND WAVE MOMENTUM OSCILLATOR</span>
                    <span id="wave-val" style="color:var(--blue-jifu)">0.0000 / 0.0000</span>
                </div>
                <canvas id="waveCanvas" style="width: 100%; height: 80px;"></canvas>
            </div>
        </div>

        <aside id="side-dashboard">
            <div class="header-brand"><img src="logo.png" style="height: 30px;"></div>
            
            <!-- CALCULATEUR REPARE -->
            <div class="calc-card">
                <div style="color:var(--blue-jifu); text-align:center; font-size:11px; font-weight:bold; margin-bottom:15px; text-transform:uppercase;">Risk Management</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div>
                        <label style="font-size:9px; color:#8b949e;">CAPITAL ($)</label>
                        <input type="number" id="input-cap" value="1000">
                    </div>
                    <div>
                        <label style="font-size:9px; color:#8b949e;">RISQUE %</label>
                        <input type="number" id="input-risk" value="1">
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <div>
                        <label style="font-size:9px; color:#8b949e;">ENTRÉE</label>
                        <input type="number" id="input-entry" placeholder="0.00">
                    </div>
                    <div>
                        <label style="font-size:9px; color:#8b949e;">STOP LOSS</label>
                        <input type="number" id="input-sl" placeholder="0.00">
                    </div>
                </div>
                <div class="result-box">
                    <span style="font-size:9px; color:var(--blue-jifu); font-weight:bold;">POSITION SIZE (LOTS)</span>
                    <span id="display-lot" class="result-val">0.00</span>
                </div>
            </div>

            <div style="font-size:10px; color:#444; padding:10px 15px; font-weight:bold;">SCANNER VIP ALERTS</div>
            <div style="margin: 0 10px; padding:12px; background:#121212; border-radius:6px; border-left:3px solid var(--accent);">
                <b>BITCOIN (BTCUSD)</b><br>
                <small style="color:#8b949e;">En attente de signal...</small>
            </div>
        </aside>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // --- 1. HORLOGE DYNAMIQUE (FIXÉ) ---
    function startClock() {
        const clockElement = document.getElementById('clock-display');
        setInterval(() => {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            clockElement.innerText = `${hours}:${minutes}:${seconds} Europe/Paris`;
        }, 1000);
    }

    // --- 2. CALCULATEUR DYNAMIQUE (FIXÉ) ---
    function initCalculator() {
        const capInput = document.getElementById('input-cap');
        const riskInput = document.getElementById('input-risk');
        const entryInput = document.getElementById('input-entry');
        const slInput = document.getElementById('input-sl');
        const resultDisplay = document.getElementById('display-lot');

        const calculate = () => {
            const cap = parseFloat(capInput.value) || 0;
            const risk = parseFloat(riskInput.value) || 0;
            const entry = parseFloat(entryInput.value) || 0;
            const sl = parseFloat(slInput.value) || 0;

            if (cap > 0 && risk > 0 && entry > 0 && sl > 0 && entry !== sl) {
                const riskAmount = cap * (risk / 100);
                const pipsDistance = Math.abs(entry - sl);
                // Facteur 10 par défaut pour le Gold/Forex, à ajuster selon l'actif
                const lots = riskAmount / (pipsDistance * 10); 
                resultDisplay.innerText = lots.toFixed(2);
            } else {
                resultDisplay.innerText = "0.00";
            }
        };

        [capInput, riskInput, entryInput, slInput].forEach(input => {
            input.addEventListener('input', calculate);
        });
    }

    // --- 3. OSCILLATEUR TREND WAVE (VISUEL) ---
    function initWave() {
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        const valDisplay = document.getElementById('wave-val');
        let offset = 0;

        function animate() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Ligne centrale
            ctx.beginPath();
            ctx.strokeStyle = "rgba(255,255,255,0.05)";
            ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2);
            ctx.stroke();

            // Vague
            ctx.beginPath();
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            offset += 0.03;
            for(let i=0; i<canvas.width; i++) {
                let y = canvas.height/2 + Math.sin(i*0.02 + offset)*20 + Math.cos(i*0.01 + offset)*10;
                ctx.lineTo(i, y);
            }
            ctx.stroke();

            if(Math.random() > 0.98) {
                valDisplay.innerText = (Math.random()*20).toFixed(4) + " / " + (Math.random()*-10).toFixed(4);
            }
            requestAnimationFrame(animate);
        }
        animate();
    }

    // Lancement de tout le système
    window.onload = () => {
        startClock();
        initCalculator();
        initWave();
        new TradingView.widget({
            "autosize": true, "symbol": "BITSTAMP:BTCUSD", "interval": "5", "theme": "dark",
            "style": "1", "container_id": "tv-chart", "backgroundColor": "#131722", "gridColor": "#1e222d"
        });
    };
</script>
</body>
</html>
