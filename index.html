<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LE COIN TRADER - VIP TERMINAL V15.0</title>
<!-- FontAwesome pour les icônes JIFU style -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--bg-deep: #0d1117;
--bg-sidebar: #080a0d;
--bg-card: #161b22;
--accent: #e3b341; /* Ton Or */
--blue-jifu: #00d2ff;
--border: #30363d;
}

html, body { height: 100%; margin: 0; overflow: hidden; background-color: var(--bg-deep); font-family: 'Inter', 'Segoe UI', sans-serif; color: white; }

.main-container { display: flex; height: 100vh; width: 100vw; }

/* 1. SIDEBAR ICONIQUE (STYLE JIFU) */
.jifu-sidebar {
width: 65px;
background-color: var(--bg-sidebar);
border-right: 1px solid var(--border);
display: flex;
flex-direction: column;
align-items: center;
padding-top: 20px;
z-index: 10;
}
.nav-icon {
width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
margin-bottom: 20px; border-radius: 10px; color: #8b949e; cursor: pointer; transition: 0.3s;
}
.nav-icon:hover, .nav-icon.active { background: var(--bg-card); color: var(--accent); }

/* 2. ZONE CENTRALE (GRAPHIQUE + LOGO) */
.center-content { flex: 1; display: flex; flex-direction: column; position: relative; }

#chart-zone { flex: 1; position: relative; background: var(--bg-deep); }
#tv-chart { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

/* Ton filigrane préservé */
.chart-watermark {
position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
z-index: 2; opacity: 0.12; pointer-events: none; width: 300px;
}

/* ZONE OSCILLATEUR (BAS DU GRAPHIQUE) */
#oscillator-zone {
height: 150px;
background: var(--bg-sidebar);
border-top: 1px solid var(--border);
z-index: 5;
display: flex;
align-items: center;
justify-content: center;
color: #444c56;
font-size: 12px;
text-transform: uppercase;
}

/* 3. DASHBOARD DROITE (CALCULATEUR + SIGNALS) */
#side-dashboard {
width: 350px;
background-color: var(--bg-sidebar);
display: flex;
flex-direction: column;
border-left: 1px solid var(--border);
overflow-y: auto;
}

/* Ton Header */
.header-brand { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
.header-logo { height: 40px; }

/* Calculateur Premium */
.calc-card { background: var(--bg-card); margin: 15px; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
.calc-title { color: var(--blue-jifu); text-align: center; font-size: 12px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }

.input-group { margin-bottom: 10px; }
.input-label { font-size: 10px; color: #8b949e; margin-bottom: 5px; display: block; }
.dual-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

input {
width: 100%; background: #0d1117; border: 1px solid var(--border);
border-radius: 6px; padding: 8px; color: white; box-sizing: border-box; outline: none;
}

.result-box {
background: #0d1117; border: 1px solid var(--blue-jifu); border-radius: 8px;
padding: 10px; margin-top: 15px; text-align: center;
}
.result-val { color: var(--blue-jifu); font-size: 28px; font-weight: 800; display: block; }

/* Signaux */
.section-title { font-size: 11px; color: #8b949e; padding: 10px 15px; text-transform: uppercase; }
.signal-item {
margin: 0 15px 10px; padding: 12px; background: var(--bg-card);
border-radius: 8px; border-left: 4px solid var(--accent); cursor: pointer; transition: 0.2s;
}
.signal-item:hover { background: #21262d; transform: translateX(5px); }
.signal-info { display: flex; justify-content: space-between; align-items: center; }

.tp-list { margin-top: 10px; display: none; padding-top: 10px; border-top: 1px solid var(--border); }
.tp-list.open { display: block; }
.badge { display: flex; justify-content: space-between; font-size: 10px; padding: 5px; color: #00ff88; }
</style>
</head>
<body>

<div class="main-container">
<!-- BARRE LATERALE STYLE JIFU -->
<nav class="jifu-sidebar">
<div class="nav-icon active"><i class="fas fa-chart-line"></i></div>
<div class="nav-icon"><i class="fas fa-graduation-cap"></i></div>
<div class="nav-icon"><i class="fas fa-bell"></i></div>
<div class="nav-icon"><i class="fas fa-cog"></i></div>
<div class="nav-icon" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i></div>
</nav>

<!-- ZONE CENTRALE -->
<div class="center-content">
<div id="chart-zone">
<div id="tv-chart"></div>
<!-- Ton Logo en filigrane -->
<img src="logo.png" class="chart-watermark">
</div>

<!-- Zone pour ton futur indicateur Trend Wave -->
<div id="oscillator-zone">
<i class="fas fa-wave-square" style="margin-right: 10px;"></i>
Trend Wave Momentum Oscillator
</div>
</div>

<!-- DASHBOARD DROITE -->
<div id="side-dashboard">
<div class="header-brand"><img src="logo.png" class="header-logo"></div>

<div class="calc-card">
<div class="calc-title">Risk Management</div>
<div class="dual-inputs group">
<div><span class="input-label">CAPITAL (€)</span><input type="number" id="cap" value="1000" oninput="updateCalculation()"></div>
<div><span class="input-label">RISQUE %</span><input type="number" id="risk" value="1" oninput="updateCalculation()"></div>
</div>
<div class="dual-inputs group" style="margin-top:10px;">
<div><span class="input-label">ENTRÉE</span><input type="number" id="price-in" placeholder="0.00" oninput="updateCalculation()"></div>
<div><span class="input-label">STOP LOSS</span><input type="number" id="price-sl" placeholder="0.00" oninput="updateCalculation()"></div>
</div>

<div class="result-box">
<span style="font-size:9px; color:#8b949e;">POSITION SIZE (LOTS)</span>
<span id="res-lot" class="result-val">0.10</span>
</div>
</div>

<div class="section-title">Scanner VIP Alerts</div>
<div id="alerts-container">
<!-- Signal 1 -->
<div class="signal-item" onclick="autoTrade('OANDA:XAUUSD', 2348.40, 2342.10, this, 10)">
<div class="signal-info">
<div><b>GOLD</b><br><small style="color:#8b949e;">Achat Confirmé</small></div>
<div style="color:var(--accent); font-weight:bold;">2348.40</div>
</div>
<div class="tp-list">
<div class="badge">TP1: 2355.00</div>
<div class="badge">TP2: 2360.00</div>
<div class="badge" style="color:#ff5252;">SL: 2342.10</div>
</div>
</div>

<!-- Signal 2 -->
<div class="signal-item" style="border-left-color: var(--blue-jifu);" onclick="autoTrade('CAPITALCOM:US30', 38500, 38550, this, 1)">
<div class="signal-info">
<div><b>DOW JONES</b><br><small style="color:#8b949e;">Vente Setup</small></div>
<div style="color:var(--blue-jifu); font-weight:bold;">38500</div>
</div>
<div class="tp-list">
<div class="badge">TP1: 38400</div>
<div class="badge" style="color:#ff5252;">SL: 38550</div>
</div>
</div>
</div>
</div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
let currentFactor = 10;
let tvWidget;

function loadChart(symbol) {
tvWidget = new TradingView.widget({
"autosize": true,
"symbol": symbol,
"interval": "15",
"theme": "dark",
"style": "1",
"locale": "fr",
"hide_side_toolbar": false,
"container_id": "tv-chart",
"backgroundColor": "#0d1117",
"gridColor": "rgba(48, 54, 61, 0.5)"
});
}
loadChart("OANDA:XAUUSD");

function autoTrade(symbol, entry, sl, element, factor) {
// 1. Change le graphique
loadChart(symbol);

// 2. Remplit le calculateur
document.getElementById('price-in').value = entry;
document.getElementById('price-sl').value = sl;
currentFactor = factor;
updateCalculation();

// 3. Animation d'ouverture
document.querySelectorAll('.tp-list').forEach(l => l.classList.remove('open'));
element.querySelector('.tp-list').classList.add('open');
}

function updateCalculation() {
const cap = parseFloat(document.getElementById('cap').value);
const risk = parseFloat(document.getElementById('risk').value);
const entry = parseFloat(document.getElementById('price-in').value);
const sl = parseFloat(document.getElementById('price-sl').value);

if (cap && risk && entry && sl && entry !== sl) {
const amountToRisk = cap * (risk / 100);
const distance = Math.abs(entry - sl);
let totalLots = amountToRisk / (distance * currentFactor);
document.getElementById('res-lot').innerText = (totalLots < 0.01 ? 0.01 : totalLots).toFixed(2);
}
}
</script>
</body>
</html>
