<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LE COIN TRADER - VIP TERMINAL V15.0</title>
    <!-- FontAwesome pour les icônes JIFU style -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #060606; /* Noir profond des photos Elite */
            --bg-sidebar: #000000;
            --bg-card: #121212;
            --accent: #e3b341; /* Ton Or VIP */
            --blue-jifu: #00d2ff;
            --border: #1e222d;
        }

        html, body { height: 100%; margin: 0; overflow: hidden; background-color: var(--bg-deep); font-family: 'Inter', sans-serif; color: white; }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* 1. TOP NAV BAR (Photo 4) */
        .top-nav-bar {
            height: 45px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: flex-end; padding: 0 20px; gap: 20px; font-size: 12px; z-index: 100;
        }
        .live-tag { background: #ff0050; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 9px; animation: blink 2s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }

        .main-container { display: flex; flex: 1; height: calc(100vh - 45px); }

        /* 2. SIDEBAR ICONIQUE (Photo 1) */
        .jifu-sidebar {
            width: 60px; background-color: #000; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding-top: 15px; flex-shrink: 0;
        }
        .nav-icon { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; color: #d1d4dc; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .nav-icon:hover { color: var(--accent); }
        .nav-icon.active { color: var(--accent); position: relative; }
        .nav-icon.active::after { content: ''; position: absolute; left: 0; width: 3px; height: 20px; background: var(--accent); }

        /* 3. ZONE CENTRALE (Graphique) */
        .center-content { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #131722; }

        .chart-controls {
            height: 38px; background: #131722; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: flex-end; padding: 0 10px; gap: 8px;
        }
        .ctrl-btn { background: #2a2e39; border: none; color: white; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        #chart-zone { flex: 1; position: relative; overflow: hidden; }
        #tv-chart { width: 100%; height: 100%; border: none; }
        
        .chart-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.12; width: 250px; pointer-events: none; z-index: 5; }

        /* 4. OSCILLATEUR TREND WAVE (Bas de la Photo 5) */
        #oscillator-zone {
            height: 140px; background: #000; border-top: 2px solid var(--border); padding: 10px; flex-shrink: 0;
        }
        .wave-header { font-size: 10px; color: #8b949e; display: flex; justify-content: space-between; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }

        /* 5. DASHBOARD DROITE (Calculateur + Signaux) */
        #side-dashboard {
            width: 320px; background-color: #000; border-left: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
        }

        .header-brand { padding: 15px; text-align: center; border-bottom: 1px solid var(--border); }
        .header-logo { height: 35px; }

        .calc-card { background: #121212; margin: 10px; padding: 15px; border-radius: 8px; border: 1px solid #2a2e39; }
        .calc-title { color: var(--blue-jifu); text-align: center; font-size: 11px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }

        .input-label { font-size: 9px; color: #8b949e; margin-bottom: 4px; display: block; }
        input { width: 100%; background: #000; border: 1px solid #333; border-radius: 4px; padding: 8px; color: white; margin-top: 2px; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--accent); }

        .result-box { background: #000; border: 1px solid var(--blue-jifu); margin-top: 15px; padding: 12px; border-radius: 6px; text-align: center; }
        .result-val { color: var(--blue-jifu); font-size: 32px; font-weight: 800; display: block; }

        /* Alertes Signaux */
        .section-title { font-size: 10px; color: #444; padding: 10px 15px; text-transform: uppercase; font-weight: bold; }
        .signal-item {
            margin: 5px 10px; padding: 12px; background: #121212; border-radius: 6px; 
            border-left: 3px solid var(--accent); cursor: pointer; transition: 0.2s;
        }
        .signal-item:hover { background: #1c1c1c; transform: translateX(5px); }
    </style>
</head>
<body>

<div class="app-wrapper">
    <!-- BARRE SUPÉRIEURE -->
    <header class="top-nav-bar">
        <div class="live-tag">LIVE</div>
        <div>23:48 Europe/Paris <i class="fas fa-chevron-down"></i></div>
        <div><i class="fas fa-globe"></i> French (FR) <i class="fas fa-chevron-down"></i></div>
        <div><i class="fas fa-bell-slash"></i></div>
        <div style="width: 28px; height: 28px; background: #333; border-radius: 50%;"></div>
    </header>

    <div class="main-container">
        <!-- BARRE LATERALE (Photo 1) -->
        <nav class="jifu-sidebar">
            <div class="nav-icon active"><i class="fas fa-home"></i></div>
            <div class="nav-icon"><i class="fas fa-graduation-cap"></i></div>
            <div class="nav-icon"><i class="fas fa-lightbulb"></i></div>
            <div class="nav-icon"><i class="fas fa-video"></i></div>
            <div class="nav-icon"><i class="fas fa-id-badge"></i></div>
            <div class="nav-icon" style="color:var(--accent)"><i class="fas fa-microchip"></i></div>
            <div class="nav-icon"><i class="fas fa-award"></i></div>
            <div class="nav-icon"><i class="fas fa-chart-bar"></i></div>
            <div class="nav-icon" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i></div>
        </nav>

        <!-- ZONE CENTRALE -->
        <div class="center-content">
            <div class="chart-controls">
                <select class="ctrl-btn"><option>Dark</option></select>
                <button class="ctrl-btn" style="color:#ff5252;"><i class="fas fa-trash"></i></button>
                <button class="ctrl-btn"><i class="fas fa-camera"></i></button>
                <button class="ctrl-btn"><i class="fas fa-expand"></i></button>
            </div>

            <div id="chart-zone">
                <div id="tv-chart"></div>
                <!-- Filigrane Logo -->
                <img src="logo.png" class="chart-watermark">
            </div>

            <!-- OSCILLATEUR (Photo 5) -->
            <div id="oscillator-zone">
                <div class="wave-header">
                    <span>TREND WAVE MOMENTUM OSCILLATOR</span>
                    <span style="color:var(--blue-jifu)">18.3980 / -5.4517</span>
                </div>
                <canvas id="waveCanvas" style="width: 100%; height: 90px;"></canvas>
            </div>
        </div>

        <!-- DASHBOARD DROITE -->
        <aside id="side-dashboard">
            <div class="header-brand"><img src="logo.png" class="header-logo"></div>
            
            <div class="calc-card">
                <div class="calc-title">Risk Management</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><span class="input-label">CAPITAL ($)</span><input type="number" id="cap" value="1000" oninput="updateCalculation()"></div>
                    <div><span class="input-label">RISQUE %</span><input type="number" id="risk" value="1" oninput="updateCalculation()"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <div><span class="input-label">ENTRÉE</span><input type="number" id="price-in" placeholder="0.00" oninput="updateCalculation()"></div>
                    <div><span class="input-label">STOP LOSS</span><input type="number" id="price-sl" placeholder="0.00" oninput="updateCalculation()"></div>
                </div>

                <div class="result-box">
                    <span style="font-size:9px; color:var(--blue-jifu); text-transform:uppercase;">Position Size (Lots)</span>
                    <span id="res-lot" class="result-val">0.16</span>
                </div>
            </div>

            <div class="section-title">Scanner VIP Alerts</div>
            <div id="alerts-container">
                <div class="signal-item" onclick="loadChart('OANDA:XAUUSD')">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>GOLD (XAUUSD)</b>
                        <span style="color:var(--accent); font-weight:bold;">2348.40</span>
                    </div>
                    <div style="font-size:10px; color:#8b949e; margin-top:4px;">Achat Confirmé</div>
                </div>
            </div>
        </aside>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentFactor = 10;

    function loadChart(symbol) {
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "15",
            "theme": "dark",
            "style": "1",
            "locale": "fr",
            "container_id": "tv-chart",
            "backgroundColor": "#131722",
            "gridColor": "#1e222d",
            "hide_top_toolbar": false,
            "save_image": false
        });
    }
    loadChart("OANDA:XAUUSD");

    function updateCalculation() {
        const cap = parseFloat(document.getElementById('cap').value);
        const risk = parseFloat(document.getElementById('risk').value);
        const entry = parseFloat(document.getElementById('price-in').value);
        const sl = parseFloat(document.getElementById('price-sl').value);

        if (cap && risk && entry && sl && entry !== sl) {
            const amountToRisk = cap * (risk / 100);
            const distance = Math.abs(entry - sl);
            let totalLots = amountToRisk / (distance * currentFactor);
            document.getElementById('res-lot').innerText = (totalLots < 0.01 ? 0.01 : totalLots).toFixed(2);
        }
    }

    // Animation de l'oscillateur (Photo 5)
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    function drawWave() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        
        // Ligne centrale
        ctx.beginPath();
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.moveTo(0, canvas.height/2);
        ctx.lineTo(canvas.width, canvas.height/2);
        ctx.stroke();

        // Vague verte
        ctx.beginPath();
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 2;
        for(let i=0; i<canvas.width; i++) {
            ctx.lineTo(i, canvas.height/2 + Math.sin(i*0.03 + Date.now()*0.002)*25);
        }
        ctx.stroke();
        requestAnimationFrame(drawWave);
    }
    drawWave();
</script>
</body>
</html>
