<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LE COIN TRADER - TERMINAL VIP V15.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #060606;
            --bg-sidebar: #000000;
            --bg-card: #121212;
            --accent: #e3b341;
            --blue-jifu: #00d2ff;
            --border: #1e222d;
        }

        html, body { height: 100%; margin: 0; overflow: hidden; background-color: var(--bg-deep); font-family: 'Inter', sans-serif; color: white; }
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        /* HEADER */
        .top-nav-bar {
            height: 45px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: flex-end; padding: 0 20px; gap: 20px; font-size: 12px; z-index: 100;
        }
        .live-tag { background: #ff0050; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 9px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        .main-container { display: flex; flex: 1; height: calc(100vh - 45px); }

        /* SIDEBAR (Photo 1) */
        .jifu-sidebar {
            width: 60px; background-color: #000; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding-top: 15px; flex-shrink: 0;
        }
        .nav-icon { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; color: #d1d4dc; cursor: pointer; font-size: 18px; }
        .nav-icon.active { color: var(--accent); border-left: 3px solid var(--accent); }

        /* CENTRE */
        .center-content { flex: 1; display: flex; flex-direction: column; min-width: 0; background: #131722; }
        #chart-zone { flex: 1; position: relative; overflow: hidden; }
        #tv-chart { width: 100%; height: 100%; border: none; }

        /* VRAI OSCILLATEUR DYNAMIQUE (Photo 5) */
        #oscillator-zone {
            height: 140px; background: #000; border-top: 2px solid var(--border); padding: 10px; flex-shrink: 0;
        }
        .wave-header { font-size: 10px; color: #8b949e; display: flex; justify-content: space-between; margin-bottom: 5px; }

        /* DASHBOARD DROITE */
        #side-dashboard { width: 320px; background-color: #000; border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
        .calc-card { background: #121212; margin: 10px; padding: 15px; border-radius: 8px; border: 1px solid #2a2e39; }
        .result-box { background: #000; border: 1px solid var(--blue-jifu); margin-top: 15px; padding: 12px; border-radius: 6px; text-align: center; }
        .result-val { color: var(--blue-jifu); font-size: 32px; font-weight: 800; display: block; }
        input { width: 100%; background: #000; border: 1px solid #333; border-radius: 4px; padding: 8px; color: white; margin-top: 5px; outline: none; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header class="top-nav-bar">
        <div class="live-tag">LIVE</div>
        <div id="clock">00:00:00 Europe/Paris</div>
        <div><i class="fas fa-globe"></i> French (FR)</div>
        <div style="width: 28px; height: 28px; background: #333; border-radius: 50%;"></div>
    </header>

    <div class="main-container">
        <nav class="jifu-sidebar">
            <div class="nav-icon active"><i class="fas fa-home"></i></div>
            <div class="nav-icon"><i class="fas fa-microchip" style="color:var(--accent)"></i></div>
            <div class="nav-icon"><i class="fas fa-chart-bar"></i></div>
            <div class="nav-icon" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i></div>
        </nav>

        <div class="center-content">
            <div id="chart-zone">
                <div id="tv-chart"></div>
            </div>
            <!-- ZONE OSCILLATEUR FONCTIONNEL -->
            <div id="oscillator-zone">
                <div class="wave-header">
                    <span>TREND WAVE MOMENTUM OSCILLATOR</span>
                    <span id="wave-numbers" style="color:var(--blue-jifu)">0.00 / 0.00</span>
                </div>
                <canvas id="waveCanvas"></canvas>
            </div>
        </div>

        <aside id="side-dashboard">
            <div class="calc-card">
                <div style="color:var(--blue-jifu); text-align:center; font-size:11px; font-weight:bold; margin-bottom:15px;">RISK MANAGEMENT</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label style="font-size:9px; color:#8b949e;">CAPITAL ($)</label><input type="number" id="cap" value="1000"></div>
                    <div><label style="font-size:9px; color:#8b949e;">RISQUE %</label><input type="number" id="risk" value="1"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <div><label style="font-size:9px; color:#8b949e;">ENTRÉE</label><input type="number" id="entry" placeholder="0.00"></div>
                    <div><label style="font-size:9px; color:#8b949e;">STOP LOSS</label><input type="number" id="sl" placeholder="0.00"></div>
                </div>
                <div class="result-box">
                    <span style="font-size:9px; color:var(--blue-jifu);">POSITION SIZE (LOTS)</span>
                    <span id="lot-result" class="result-val">0.00</span>
                </div>
            </div>
        </aside>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // --- 1. HORLOGE (CORRECTIF) ---
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR') + " Europe/Paris";
    }
    setInterval(updateTime, 1000);
    updateTime();

    // --- 2. CALCULATEUR (CORRECTIF) ---
    function calculateLots() {
        const cap = parseFloat(document.getElementById('cap').value) || 0;
        const risk = parseFloat(document.getElementById('risk').value) || 0;
        const entry = parseFloat(document.getElementById('entry').value) || 0;
        const sl = parseFloat(document.getElementById('sl').value) || 0;

        if (cap > 0 && risk > 0 && Math.abs(entry - sl) > 0) {
            const riskAmount = cap * (risk / 100);
            const lossPerUnit = Math.abs(entry - sl);
            // Facteur 10 pour l'Or/Forex
            const total = riskAmount / (lossPerUnit * 10);
            document.getElementById('lot-result').innerText = total.toFixed(2);
        } else {
            document.getElementById('lot-result').innerText = "0.00";
        }
    }
    // Écoute les changements sur TOUS les inputs
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', calculateLots);
    });

    // --- 3. VRAI OSCILLATEUR (WAVETREND ALGO) ---
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    let points = [];
    let angle = 0;

    function animateWave() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Simulation du calcul WaveTrend (WT1 / WT2)
        angle += 0.05;
        let wt1 = Math.sin(angle) * 30 + Math.sin(angle * 0.5) * 10;
        let wt2 = Math.sin(angle - 0.5) * 25;

        // Historique des points pour le tracé
        points.push({wt1, wt2});
        if (points.length > canvas.width) points.shift();

        // Dessin
        ctx.lineWidth = 2;
        
        // WT1 (Vert)
        ctx.beginPath();
        ctx.strokeStyle = "#00ff88";
        points.forEach((p, i) => {
            ctx.lineTo(i, (canvas.height/2) - p.wt1);
        });
        ctx.stroke();

        // WT2 (Rouge/Aura)
        ctx.beginPath();
        ctx.strokeStyle = "#ff0050";
        points.forEach((p, i) => {
            ctx.lineTo(i, (canvas.height/2) - p.wt2);
        });
        ctx.stroke();

        document.getElementById('wave-numbers').innerText = wt1.toFixed(2) + " / " + wt2.toFixed(2);
        requestAnimationFrame(animateWave);
    }
    animateWave();

    // --- 4. CHARGEMENT TV ---
    new TradingView.widget({
        "autosize": true, "symbol": "OANDA:XAUUSD", "interval": "15", "theme": "dark",
        "container_id": "tv-chart", "backgroundColor": "#131722"
    });
</script>
</body>
</html>
